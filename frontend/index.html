<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard | Analizador de Cumplimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: #212529; color: white; padding: 60px 0; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Analizador de Riesgos Técnicos</h1>
            <p class="lead">Evaluación de activos bajo estándares ISO 27001 y Ley 1581</p>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <label for="ipInput" class="form-label fw-bold">IP o Dominio de la Empresa</label>
                        <div class="input-group">
                            <input type="text" id="ipInput" class="form-control" placeholder="ej. 8.8.8.8">
                            <button class="btn btn-dark" onclick="iniciarAnalisis()">
                                <i class="bi bi-search"></i> Escanear
                            </button>
                        </div>
                        
                        <div id="loader" class="text-center mt-3 d-none">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Consultando inteligencia de amenazas...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="resultado" class="mt-5 mb-5"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
